<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BRUNÃO BANANÃO 🍌</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Boogaloo&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Boogaloo', cursive;
  overflow-x: hidden;
  min-height: 100vh;
  animation: bgFlash 0.5s infinite;
}

/* Controlar “quanta escuridão” fica por cima do tapete por página */
body.p1 { --carpet-dim: 0.38; }
body.p2 { --carpet-dim: 0.38; }
/* Página 3: tapete mais visível */
body.p3 { --carpet-dim: 0.18; }

@keyframes bgFlash {
  0%   { background: #ff00ff; }
  25%  { background: #00ffff; }
  50%  { background: #ffff00; }
  75%  { background: #ff6600; }
  100% { background: #ff00ff; }
}

/* ───── TAPETE ROLANTE (3 FILEIRAS) ───── */
.bg-carpet {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: 0;
  pointer-events: none;
}

.bg-carpet::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, var(--carpet-dim, 0.35));
  pointer-events: none;
}

/* Agora é uma coluna com 3 pistas */
.bg-carpet-rows{
  height: 100%;
  display: flex;
  flex-direction: column;
}

.bg-carpet-row{
  flex: 1 1 0;
  overflow: hidden;
}

.bg-carpet-track {
  display: flex;
  height: 100%;
  width: max-content;
  will-change: transform;
}

.bg-carpet-track img {
  height: 100%;
  width: auto;
  display: block;
  object-fit: cover;
  flex-shrink: 0;
  pointer-events: none;
  /* um bocadinho mais “vivo” para se perceber melhor */
  filter: saturate(1.15) contrast(1.05);
}

@keyframes carpetSlideLeft {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
@keyframes carpetSlideRight {
  from { transform: translateX(-50%); }
  to   { transform: translateX(0); }
}

/* velocidades diferentes por fileira */
.bg-carpet-row.row1 .bg-carpet-track { animation: carpetSlideLeft 60s linear infinite; }
.bg-carpet-row.row2 .bg-carpet-track { animation: carpetSlideRight 85s linear infinite; }
.bg-carpet-row.row3 .bg-carpet-track { animation: carpetSlideLeft 72s linear infinite; }

/* ───── PÁGINAS ───── */
.pagina {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  text-align: center;
  position: relative;
  z-index: 2;
}
.pagina.ativa { display: flex; }

/* ───── TEXTOS ───── */
.titulo {
  font-size: clamp(2rem, 8vw, 5rem);
  color: white;
  line-height: 1.1;
  margin-bottom: 20px;
  text-shadow: 4px 4px 0 #ff0000, -4px -4px 0 #00ff00, 8px 8px 0 #0000ff;
  animation: shake 0.2s infinite, rainbow 1s infinite;
}

.subtitulo {
  font-size: clamp(1.5rem, 5vw, 3rem);
  color: yellow;
  margin-top: 20px;
  text-shadow: 3px 3px 0 #ff0000;
  animation: shake 0.3s infinite, rainbow 0.6s infinite;
}

.emojis {
  font-size: 2.5rem;
  margin: 15px 0;
  animation: bounce 0.6s infinite;
}

/* ───── BOTÕES ───── */
.btn {
  position: relative;
  z-index: 3;
  margin-top: 20px;
  padding: 16px 28px;
  font-size: 1.8rem;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  color: white;
  font-family: 'Boogaloo', cursive;
  text-shadow: 2px 2px 4px black;
  background: linear-gradient(45deg, red, orange, yellow, lime, cyan, magenta);
  background-size: 300% 300%;
  box-shadow: 0 0 25px white;
  animation: gradientShift 1s infinite, shake 0.2s infinite;
}

.sound-btn {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 70px;
  height: 70px;
  border: none;
  border-radius: 50%;
  font-size: 1.8rem;
  cursor: pointer;
  background: white;
  box-shadow: 0 0 20px #000;
  z-index: 20;
}

/* ───── OVERLAY INICIAL ───── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  padding: 20px;
}

.overlay button {
  font-family: 'Boogaloo', cursive;
  font-size: clamp(1.5rem, 5vw, 3rem);
  padding: 20px 28px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  color: white;
  background: linear-gradient(45deg, #ff0000, #ff8800, #ffff00, #00ff00, #00ffff, #ff00ff);
  background-size: 300% 300%;
  box-shadow: 0 0 30px white;
  animation: gradientShift 1s infinite, shake 0.2s infinite;
}

/* ───── PÁGINA 2 ───── */
.titulo-p2 {
  font-size: clamp(1.8rem, 6vw, 4rem);
  color: white;
  line-height: 1.2;
  margin-bottom: 30px;
  text-shadow: 4px 4px 0 #ff0000, -4px -4px 0 #00ff00;
  animation: shake 0.2s infinite, rainbow 1s infinite;
}

.video-wrapper {
  width: 100%;
  max-width: 700px;
  border: 6px solid white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 30px #ff00ff, 0 0 60px #00ffff;
  animation: floatBounce 2s infinite;
  margin-bottom: 30px;
}

.video-wrapper video { width: 100%; display: block; }

.btn-voltar {
  position: relative;
  z-index: 3;
  margin-top: 10px;
  padding: 14px 24px;
  font-size: 1.5rem;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  color: white;
  font-family: 'Boogaloo', cursive;
  text-shadow: 2px 2px 4px black;
  background: linear-gradient(45deg, red, orange, yellow, lime, cyan, magenta);
  background-size: 300% 300%;
  box-shadow: 0 0 25px white;
  animation: gradientShift 1s infinite, shake 0.2s infinite;
}

/* ───── PÁGINA 3 — FESTA ───── */
#pagina3 { animation: festaPulse 0.4s infinite; }

@keyframes festaPulse {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.02); }
}

.foto-final {
  width: 100%;
  max-width: 500px;
  border: 8px solid white;
  border-radius: 20px;
  box-shadow: 0 0 40px #ff00ff, 0 0 80px #ffff00, 0 0 120px #00ffff;
  animation: floatBounce 1.2s infinite, glowPulse 0.8s infinite;
  margin: 20px 0 30px;
  display: block;
  position: relative;
  z-index: 3;
}

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 40px #ff00ff, 0 0 80px #ffff00; }
  50%      { box-shadow: 0 0 60px #00ffff, 0 0 120px #ff00ff; }
}

/* ───── MEMES (CANVAS) A PASSEAR ───── */
.meme-video {
  position: fixed;
  width: 240px;
  height: 240px;
  border: none;
  box-shadow: none;
  border-radius: 0;
  z-index: 4;
  pointer-events: none;
  display: none;
  top: 0;
  left: 0;
  will-change: transform;
  background: transparent;
}

@media (max-width: 768px) {
  .meme-video { width: 150px; height: 150px; }
}

/* ───── CONFETIS ───── */
.confete {
  position: fixed;
  top: -20px;
  width: 12px;
  height: 20px;
  z-index: 5;
  pointer-events: none;
  animation: confeteFall linear forwards;
}

@keyframes confeteFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0.8; }
}

/* ───── EMOJIS VOADORES ───── */
.flying-emoji {
  position: fixed;
  bottom: -80px;
  font-size: 2rem;
  pointer-events: none;
  z-index: 3;
  animation: flyUp linear forwards;
}

@keyframes flyUp {
  from { transform: translateY(0) rotate(0deg); opacity: 1; }
  to   { transform: translateY(-120vh) rotate(720deg); opacity: 0; }
}

/* ───── KEYFRAMES ───── */
@keyframes shake {
  0%   { transform: translate(2px, 2px) rotate(1deg); }
  25%  { transform: translate(-2px, -2px) rotate(-1deg); }
  50%  { transform: translate(2px, -2px) rotate(0deg); }
  75%  { transform: translate(-2px, 2px) rotate(1deg); }
  100% { transform: translate(2px, 2px) rotate(-1deg); }
}
@keyframes rainbow {
  0%   { color: #ff0000; } 20%  { color: #ff8800; }
  40%  { color: #ffff00; } 60%  { color: #00ff00; }
  80%  { color: #00ffff; } 100% { color: #ff00ff; }
}
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
@keyframes floatBounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-18px) scale(1.05); } }
@keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
</style>
</head>
<body class="p1">

<!-- ═══ TAPETE ROLANTE (3 fileiras) ═══ -->
<div class="bg-carpet" id="bgCarpet" aria-hidden="true">
  <div class="bg-carpet-rows">
    <div class="bg-carpet-row row1"><div class="bg-carpet-track" id="track1"></div></div>
    <div class="bg-carpet-row row2"><div class="bg-carpet-track" id="track2"></div></div>
    <div class="bg-carpet-row row3"><div class="bg-carpet-track" id="track3"></div></div>
  </div>
</div>

<!-- OVERLAY SOM -->
<div class="overlay" id="soundOverlay">
  <button onclick="ativarSom()">🍌 CLICA SE ÉS O BRUNÃO GOSTOSÃO 🍌</button>
</div>

<!-- PÁGINA 1 -->
<div class="pagina ativa" id="pagina1">
  <div class="titulo">Olá brunão bananão…. por favor não…não me roubes o colhão…va lá..😞</div>
  <div class="emojis">🍌🎂🍌🎂🍌</div>
  <div class="subtitulo">hoje fazes anos e parabéns bananocão</div>
  <div class="emojis">🎉🎊🍌🎉🎊</div>
  <button class="btn" onclick="irParaPagina2()">🍌 CLICA AQUI BRUNÃO 🍌</button>
</div>

<!-- PÁGINA 2 -->
<div class="pagina" id="pagina2">
  <div class="titulo-p2">Cá vai uma memória de ti meu amigalhão 🎥</div>
  <div class="video-wrapper">
    <video id="videoBrunao" controls playsinline webkit-playsinline>
      <source src="brunão bananão.mp4" type="video/mp4">
      O teu browser não suporta vídeo.
    </video>
  </div>
  <button class="btn" onclick="irParaPagina3()">🍌 CONTINUAR 🍌</button>
  <button class="btn-voltar" onclick="voltarParaPagina1()">🍌 VOLTAR 🍌</button>
</div>

<!-- PÁGINA 3 — FESTA 🎉 -->
<div class="pagina" id="pagina3">
  <div class="titulo">Parabéns amigo Brunão...</div>
  <div class="emojis">🍌🎂🎉🍌🎂</div>
  <div class="subtitulo">não me roubes o colhão 😞</div>
  <img src="brunão bananão.png" alt="Brunão Bananão" class="foto-final">
  <button class="btn-voltar" onclick="voltarParaPagina2()">🍌 VOLTAR 🍌</button>
</div>

<!-- ═══ MEMES A PASSEAR (canvas com chroma key) ═══ -->
<canvas class="meme-video"></canvas>
<canvas class="meme-video"></canvas>
<canvas class="meme-video"></canvas>
<canvas class="meme-video"></canvas>
<canvas class="meme-video"></canvas>
<canvas class="meme-video"></canvas>
<canvas class="meme-video"></canvas>

<!-- Botão som -->
<button class="sound-btn" onclick="toggleSom()" id="soundBtn">🎵</button>

<!-- Música 1 -->
<audio id="musica" loop preload="auto">
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- Música 2 -->
<audio id="musica2" loop preload="auto">
  <source src="musica2.mp3" type="audio/mpeg">
</audio>

<script>
const musica   = document.getElementById('musica');
const musica2  = document.getElementById('musica2');
const overlay  = document.getElementById('soundOverlay');
const soundBtn = document.getElementById('soundBtn');
const video    = document.getElementById('videoBrunao');

let aTocar = false;
let musicaAtual = musica;
let confetiInterval = null;

/* ───── Tapete 3 fileiras com ordem aleatória ───── */
const carpetImages = [
  'egg sheeran.jpg',
  'cat.jpg',
  'Tralalero-Tralala.jpg',
  'alien.jpg',
  'passaro.jpg',
  'homem.jpg',
  'orangotango ananango.jpg',
  'sapeca perereca.jpg',
];

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function fillTrack(trackEl, imgList){
  trackEl.innerHTML = '';
  // Repetir a sequência 2x para o loop (-50%) funcionar bem
  const seq = imgList.concat(imgList);
  seq.forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = '';
    trackEl.appendChild(img);
  });
}

function initCarpet(){
  const t1 = document.getElementById('track1');
  const t2 = document.getElementById('track2');
  const t3 = document.getElementById('track3');

  fillTrack(t1, shuffle(carpetImages));
  fillTrack(t2, shuffle(carpetImages));
  fillTrack(t3, shuffle(carpetImages));
}

/* ───── Som ───── */
function ensurePlayIfEnabled(){
  if (!aTocar) return;
  musicaAtual.play().catch(() => {});
  soundBtn.textContent = '🔊';
}

function ativarSom() {
  // Ativa som pela primeira vez (precisa de gesto do utilizador)
  aTocar = true;
  overlay.style.display = 'none';
  ensurePlayIfEnabled();
}

function toggleSom() {
  if (aTocar) {
    musicaAtual.pause();
    aTocar = false;
    soundBtn.textContent = '🔇';
  } else {
    aTocar = true;
    ensurePlayIfEnabled();
  }
}

function trocarMusica(novaMusica) {
  if (musicaAtual === novaMusica) {
    ensurePlayIfEnabled();
    return;
  }

  // parar atual
  musicaAtual.pause();
  musicaAtual.currentTime = 0;

  // trocar
  musicaAtual = novaMusica;

  // se som estiver ativo, tocar a nova
  ensurePlayIfEnabled();
}

/* ───── Navegação (com classe no body p/ controlar tapete) ───── */
function setPagina(n) {
  document.getElementById('pagina1').classList.remove('ativa');
  document.getElementById('pagina2').classList.remove('ativa');
  document.getElementById('pagina3').classList.remove('ativa');
  document.getElementById('pagina' + n).classList.add('ativa');

  document.body.classList.remove('p1','p2','p3');
  document.body.classList.add('p' + n);

  window.scrollTo(0, 0);
}

// P1 -> P2
function irParaPagina2() {
  setPagina(2);
  trocarMusica(musica);
  esconderMemes();
  pararConfetis();
  // NÃO fazer video.play() automaticamente (no iPhone costuma matar o áudio)
}

// P2 -> P1
function voltarParaPagina1() {
  setPagina(1);
  trocarMusica(musica);
  esconderMemes();
  pararConfetis();
  video.pause();
  video.currentTime = 0;
}

// P2 -> P3
function irParaPagina3() {
  setPagina(3);
  video.pause();
  video.currentTime = 0;
  trocarMusica(musica2);
  mostrarMemes();
  iniciarConfetis();
}

// P3 -> P2
function voltarParaPagina2() {
  setPagina(2);
  trocarMusica(musica);   // ✅ volta para música 1 automaticamente
  esconderMemes();
  pararConfetis();
  // não auto-play do vídeo
}

/* ───── MEMES COM CHROMA KEY ───── */
const memeSrcs = [
  'gato1.mp4','gato2.mp4','gato3.mp4','gato4.mp4',
  'cao1.mp4','cao2.mp4','cao3.mp4'
];

const memes = [];

function iniciarMemes() {
  const canvases = document.querySelectorAll('.meme-video');

  canvases.forEach((canvas, i) => {
    const isMobile = window.innerWidth <= 768;
    const size = isMobile ? 150 : 240;
    canvas.width  = size;
    canvas.height = size;

    const vid = document.createElement('video');
    vid.src = memeSrcs[i];
    vid.autoplay = true;
    vid.loop = true;
    vid.muted = true;
    vid.playsInline = true;
    vid.crossOrigin = 'anonymous';
    vid.play().catch(() => {});

    const ctx = canvas.getContext('2d');

    function desenharFrame() {
      if (!vid.paused && !vid.ended && vid.readyState >= 2) {
        ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);
        const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = frame.data;
        for (let p = 0; p < data.length; p += 4) {
          const r = data[p], g = data[p+1], b = data[p+2];
          if (g > 120 && g > r * 1.5 && g > b * 1.5) data[p+3] = 0;
        }
        ctx.putImageData(frame, 0, 0);
      }
      requestAnimationFrame(desenharFrame);
    }
    desenharFrame();

    const estado = {
      el: canvas,
      x: Math.random() * Math.max(0, window.innerWidth  - size),
      y: Math.random() * Math.max(0, window.innerHeight - size),
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      visivel: false
    };
    if (Math.abs(estado.vx) < 1) estado.vx = estado.vx < 0 ? -1 : 1;
    if (Math.abs(estado.vy) < 1) estado.vy = estado.vy < 0 ? -1 : 1;
    memes.push(estado);
  });

  requestAnimationFrame(loopMemes);
}

function loopMemes() {
  memes.forEach(m => {
    if (!m.visivel) return;

    m.x += m.vx;
    m.y += m.vy;

    const larg = m.el.width  || 240;
    const alt  = m.el.height || 240;

    if (m.x <= 0)                          { m.x = 0; m.vx = Math.abs(m.vx); }
    if (m.x >= window.innerWidth  - larg)  { m.x = window.innerWidth  - larg; m.vx = -Math.abs(m.vx); }
    if (m.y <= 0)                          { m.y = 0; m.vy = Math.abs(m.vy); }
    if (m.y >= window.innerHeight - alt)   { m.y = window.innerHeight - alt;  m.vy = -Math.abs(m.vy); }

    m.el.style.transform = `translate(${m.x}px, ${m.y}px)`;
  });

  requestAnimationFrame(loopMemes);
}

function mostrarMemes() {
  memes.forEach(m => { m.visivel = true; m.el.style.display = 'block'; });
}

function esconderMemes() {
  memes.forEach(m => { m.visivel = false; m.el.style.display = 'none'; });
}

/* ───── CONFETIS ───── */
const coresConfete = ['#ff0000','#ff8800','#ffff00','#00ff00','#00ffff','#ff00ff','#ffffff'];

function criarConfete() {
  const c = document.createElement('div');
  c.className = 'confete';
  c.style.left = Math.random() * 100 + 'vw';
  c.style.background = coresConfete[Math.floor(Math.random() * coresConfete.length)];
  c.style.animationDuration = (2 + Math.random() * 2.5) + 's';
  c.style.width = (6 + Math.random() * 10) + 'px';
  c.style.height = (10 + Math.random() * 14) + 'px';
  c.style.opacity = 0.7 + Math.random() * 0.3;
  document.body.appendChild(c);
  setTimeout(() => c.remove(), 5000);
}

function iniciarConfetis() {
  if (confetiInterval) return;
  confetiInterval = setInterval(() => {
    for (let i = 0; i < 4; i++) criarConfete();
  }, 150);
}

function pararConfetis() {
  if (confetiInterval) {
    clearInterval(confetiInterval);
    confetiInterval = null;
  }
}

/* ───── EMOJIS VOADORES ───── */
function criarEmoji() {
  const lista = ['🍌','🎂','🎉','🎊','👽','🐦','💥','⭐'];
  const emoji = document.createElement('div');
  emoji.className = 'flying-emoji';
  emoji.textContent = lista[Math.floor(Math.random() * lista.length)];
  emoji.style.left = Math.random() * 100 + 'vw';
  emoji.style.animationDuration = (2 + Math.random() * 3) + 's';
  emoji.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
  document.body.appendChild(emoji);
  setTimeout(() => emoji.remove(), 5000);
}

window.addEventListener('load', () => {
  initCarpet();
  iniciarMemes();
  esconderMemes();
  setInterval(criarEmoji, 400);
});
</script>

</body>
</html>
